services:

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: madridmu123
      POSTGRES_DB: gbu_db_test
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  go-api:
    build: ./go-user-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./go-user-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  php-api:
    build:
      context: ./php-user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - mongo

volumes:
  postgres_data:
  mongo_data: